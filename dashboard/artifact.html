<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Scanner Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f9eff;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font); font-size: 14px;
    min-height: 100vh;
  }
  /* Google Fonts */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  /* ── Header ─────────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  #scan-meta { color: var(--muted); font-size: 12px; }

  /* ── Controls ───────────────────────────────────────────────────────────── */
  .controls {
    display: flex; gap: 12px; padding: 16px 32px;
    align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .controls input, .controls select {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 12px; font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .controls input:focus, .controls select:focus { border-color: var(--accent); }
  .controls label { color: var(--muted); font-size: 12px; }

  /* ── Stats bar ──────────────────────────────────────────────────────────── */
  .stats {
    display: flex; gap: 24px; padding: 16px 32px;
    border-bottom: 1px solid var(--border);
  }
  .stat { text-align: center; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── Table ──────────────────────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; padding: 0 32px 40px; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  thead th {
    background: var(--surface); color: var(--muted);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
    padding: 10px 14px; text-align: right;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:first-child, thead th:nth-child(2), thead th:nth-child(3) { text-align: left; }
  thead th:hover { color: var(--accent); }
  thead th.sort-asc::after { content: ' ↑'; }
  thead th.sort-desc::after { content: ' ↓'; }

  tbody tr { transition: background 0.15s; border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: rgba(79, 158, 255, 0.05); }
  td { padding: 10px 14px; text-align: right; font-variant-numeric: tabular-nums; }
  td:first-child, td:nth-child(2), td:nth-child(3) { text-align: left; }

  .rank { color: var(--muted); font-size: 12px; width: 36px; }
  .ticker-cell { font-weight: 600; font-size: 13px; }
  .exchange-badge {
    background: var(--border); border-radius: 4px;
    padding: 2px 6px; font-size: 11px; color: var(--muted);
  }

  /* Tier badges */
  .tier-badge {
    display: inline-block; border-radius: 99px;
    padding: 2px 10px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .tier-strong  { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .tier-moderate{ background: rgba(251, 191, 36, 0.15); color: var(--amber); }
  .tier-weak    { background: rgba(248, 113, 113, 0.15); color: var(--red); }

  /* Score bar */
  .score-cell { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .score-bar { height: 4px; border-radius: 2px; background: var(--border); width: 60px; }
  .score-fill { height: 100%; border-radius: 2px; background: var(--accent); }

  /* ── Empty state ────────────────────────────────────────────────────────── */
  .empty {
    text-align: center; padding: 80px 32px;
    color: var(--muted); font-size: 15px;
  }
  .empty code { color: var(--accent); background: var(--surface);
    padding: 2px 8px; border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1>📊 Signal <span>Scanner</span></h1>
  <div id="scan-meta">Loading…</div>
</header>

<div class="controls">
  <label>Filter tier</label>
  <select id="filter-tier">
    <option value="">All tiers</option>
    <option value="strong">Strong</option>
    <option value="moderate">Moderate</option>
    <option value="weak">Weak</option>
  </select>
  <label>Exchange</label>
  <select id="filter-exchange"><option value="">All</option></select>
  <label>Search</label>
  <input id="search" type="text" placeholder="Ticker or name…" style="width:180px">
</div>

<div class="stats">
  <div class="stat"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Total</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--green)" id="stat-strong">—</div><div class="stat-label">Strong</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--amber)" id="stat-moderate">—</div><div class="stat-label">Moderate</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--red)" id="stat-weak">—</div><div class="stat-label">Weak</div></div>
</div>

<div class="table-wrap">
  <table id="results-table">
    <thead>
      <tr>
        <th class="rank">#</th>
        <th data-col="ticker">Ticker</th>
        <th data-col="exchange">Exchange</th>
        <th data-col="combo_score" class="sort-desc">Score</th>
        <th data-col="tier">Tier</th>
        <th data-col="rsi_value">RSI</th>
        <th data-col="stoch_k">%K</th>
        <th data-col="vol_ann">Ann.Vol</th>
        <th data-col="volume_ratio">Vol Ratio</th>
        <th data-col="mav_diff_z_value">MAV-Z</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div class="empty" id="empty-state" style="display:none">
    No data loaded. Run <code>uv run scanner scan</code> to generate
    <code>data/latest.json</code>, then open this file.
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let allRows = [];
let sortCol = 'combo_score';
let sortDir = -1; // -1 = desc

// ---------------------------------------------------------------------------
// Load JSON (same-directory relative path or ?data= param override)
// ---------------------------------------------------------------------------
async function loadData() {
  const params = new URLSearchParams(location.search);
  const src = params.get('data') || '../data/latest.json';
  try {
    const res = await fetch(src);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    document.getElementById('scan-meta').textContent =
      `Scan date: ${json.scan_date}  ·  Generated: ${json.generated_at?.slice(0,19)} UTC`;

    allRows = json.tickers || [];
    populateExchangeFilter();
    render();
  } catch (e) {
    document.getElementById('scan-meta').textContent = 'No data — ' + e.message;
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('results-table').style.display = 'none';
  }
}

// ---------------------------------------------------------------------------
// Filters + sort
// ---------------------------------------------------------------------------
function filtered() {
  const tier = document.getElementById('filter-tier').value;
  const exch = document.getElementById('filter-exchange').value;
  const q    = document.getElementById('search').value.toLowerCase().trim();

  return allRows
    .filter(r => !tier || r.tier === tier)
    .filter(r => !exch || r.exchange === exch)
    .filter(r => !q || r.ticker?.toLowerCase().includes(q) || r.name?.toLowerCase().includes(q))
    .sort((a, b) => {
      const av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
      if (typeof av === 'number' && typeof bv === 'number') return sortDir * (av - bv);
      return sortDir * String(av).localeCompare(String(bv));
    });
}

function populateExchangeFilter() {
  const sel = document.getElementById('filter-exchange');
  const exchanges = [...new Set(allRows.map(r => r.exchange).filter(Boolean))].sort();
  exchanges.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e; opt.textContent = e;
    sel.appendChild(opt);
  });
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function fmt(v, decimals = 2) {
  if (v == null || isNaN(v)) return '—';
  return Number(v).toFixed(decimals);
}

function render() {
  const rows = filtered();
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  // Stats
  document.getElementById('stat-total').textContent    = rows.length;
  document.getElementById('stat-strong').textContent   = rows.filter(r => r.tier === 'strong').length;
  document.getElementById('stat-moderate').textContent = rows.filter(r => r.tier === 'moderate').length;
  document.getElementById('stat-weak').textContent     = rows.filter(r => r.tier === 'weak').length;

  if (!rows.length) {
    document.getElementById('empty-state').style.display = 'block';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';

  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    const score = (r.combo_score ?? 0);
    const pct   = Math.round(score * 100);

    tr.innerHTML = `
      <td class="rank">${r.rank ?? i + 1}</td>
      <td class="ticker-cell">${r.ticker ?? '—'}</td>
      <td><span class="exchange-badge">${r.exchange ?? '—'}</span></td>
      <td>
        <div class="score-cell">
          ${fmt(score, 4)}
          <div class="score-bar"><div class="score-fill" style="width:${pct}%"></div></div>
        </div>
      </td>
      <td><span class="tier-badge tier-${r.tier ?? 'weak'}">${r.tier ?? '—'}</span></td>
      <td>${fmt(r.rsi_value, 1)}</td>
      <td>${fmt(r.stoch_k, 1)}</td>
      <td>${r.vol_ann != null ? (r.vol_ann * 100).toFixed(1) + '%' : '—'}</td>
      <td>${fmt(r.volume_ratio, 2)}×</td>
      <td>${fmt(r.mav_diff_z_value, 2)}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ---------------------------------------------------------------------------
// Sort headers
// ---------------------------------------------------------------------------
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = -1; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
    th.classList.add(sortDir === -1 ? 'sort-desc' : 'sort-asc');
    render();
  });
});

// Controls
['filter-tier', 'filter-exchange', 'search'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});

// Boot
loadData();
</script>
</body>
</html>
