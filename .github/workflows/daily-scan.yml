name: Daily Scan

on:
  schedule:
    # 08:00 UTC = 04:00 EDT (summer) / 03:00 EST (winter)
    # GitHub Actions cron operates in UTC and does not track US DST drift (±1h).
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Restore DuckDB cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/scanner.duckdb
          key: duckdb-${{ github.run_id }}
          restore-keys: |
            duckdb-

      - name: Warn on cache miss
        if: steps.cache-restore.outputs.cache-hit != 'true' && github.run_number > 1
        run: |
          echo "::warning title=Missing Database Cache::DuckDB cache missed on run ${GITHUB_RUN_NUMBER}. Previous price history and metadata have been lost! Starting fresh."

      - name: Healthcheck Start Ping
        if: env.HEALTHCHECK_URL != ''
        run: curl -fsS -m 10 --retry 5 -o /dev/null "$HEALTHCHECK_URL/start" || true
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}

      - name: Run Signal Scanner
        id: run-scanner
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
          REPORT_FROM_ADDR: ${{ secrets.REPORT_FROM_ADDR }}
        run: |
          uv run scanner run-daily --universe us --send-email --report-dir=data/reports

      - name: Save DuckDB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/scanner.duckdb
          key: duckdb-${{ github.run_id }}

      - name: Prepare Dashboard Data
        run: |
          mkdir -p dashboard
          # The run_id is output by the Python script to GITHUB_OUTPUT
          cp "data/reports/${{ steps.run-scanner.outputs.run_id }}_dashboard.json" dashboard/latest.json

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Delivery monitoring - Healthchecks Success
        if: success() && steps.run-scanner.outputs.email_sent == 'true' && env.HEALTHCHECK_URL != ''
        run: curl -fsS -m 10 --retry 5 -o /dev/null "$HEALTHCHECK_URL" || true
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}

      - name: Delivery monitoring - Healthchecks Failure
        if: always() && steps.run-scanner.outputs.email_sent != 'true' && env.HEALTHCHECK_URL != ''
        run: curl -fsS -m 10 --retry 5 -o /dev/null "$HEALTHCHECK_URL/fail" || true
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
