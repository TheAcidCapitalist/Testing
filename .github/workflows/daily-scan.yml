name: Daily Scan

on:
  schedule:
    # 06:00 ET = 10:00 UTC (standard time) / 11:00 UTC (daylight saving)
    # Run at both to stay safe; the scanner is idempotent for a given date.
    - cron: "0 10 * * 1-5"
    - cron: "0 11 * * 1-5"
  workflow_dispatch:          # ← allow manual trigger from Actions UI
    inputs:
      dry_run:
        description: "Skip email & Excel (dry run)"
        required: false
        default: "false"
        type: boolean

jobs:
  scan:
    name: Run signal scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run scan
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
          UNIVERSE: ${{ vars.UNIVERSE || 'US' }}
          MIN_MARKET_CAP_M: ${{ vars.MIN_MARKET_CAP_M || '500' }}
          LOG_LEVEL: INFO
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          uv run scanner scan $DRY_FLAG

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-report-${{ github.run_id }}
          path: |
            data/latest.json
            data/*.xlsx
          retention-days: 30
